[phases.setup]
nixPkgs = ["nodejs_22"]
cmds = ["npm install -g pnpm@10"]

[phases.install]
cmds = ["pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = ["BASE_PATH=/ PORT=3000 NODE_ENV=production pnpm --filter @workspace/tempmail run build && pnpm --filter @workspace/api-server run build"]

[start]
cmd = "pnpm --filter @workspace/db run push && node artifacts/api-server/dist/index.mjs"
