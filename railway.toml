[build]
builder = "NIXPACKS"
buildCommand = "pnpm install && BASE_PATH=/ PORT=3000 NODE_ENV=production pnpm --filter @workspace/tempmail run build && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "node artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
